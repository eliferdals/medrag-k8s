---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-config
  namespace: medrag
data:
  OLLAMA_URL: "http://ollama.medrag.svc.cluster.local:11434"
  OLLAMA_MODEL: "llama3.2:3b"
  CHROMA_DIR: "/data/chroma_db"
  CLASSIFIER_PATH: "/data/models/query_classifier.pkl"
  CLASSIFIER_THRESHOLD: "0.70"
  EMBED_MODEL: "sentence-transformers/all-MiniLM-L6-v2"
  TOP_K: "4"
  DB_HOST: "medrag-postgres-rw.medrag.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "app"
  DB_USER: "app"
  JWT_EXPIRE_MIN: "60"
  HF_HOME: "/data/hf_cache"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-api
  namespace: medrag
spec:
  replicas: 1
  selector:
    matchLabels: { app: rag-api }
  template:
    metadata:
      labels: { app: rag-api }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: rag-api
          image: medrag-rag:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 8000 }
          envFrom:
            - configMapRef: { name: rag-config }
            - secretRef:    { name: rag-secret }
          resources:
            requests: { cpu: "250m", memory: "1Gi" }
            limits:   { cpu: "1",    memory: "2Gi" }
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 90
            periodSeconds: 30
          volumeMounts:
            - { name: data, mountPath: /data }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: medrag-chroma-pvc }
---
apiVersion: v1
kind: Service
metadata:
  name: rag-api
  namespace: medrag
spec:
  selector: { app: rag-api }
  ports:
    - { port: 80, targetPort: 8000 }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rag-api-hpa
  namespace: medrag
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rag-api
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
    - type: Resource
      resource:
        name: memory
        target: { type: Utilization, averageUtilization: 80 }
