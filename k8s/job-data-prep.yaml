apiVersion: batch/v1
kind: Job
metadata:
  name: medrag-data-prep
  namespace: medrag
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: data-prep
        image: medrag-jobs:v1
        imagePullPolicy: Never   # Lokal image kullan
        command: ["python", "src/data_collector.py"]
        envFrom:
        - configMapRef:
            name: medrag-config
        - secretRef:
            name: medrag-secrets
        volumeMounts:
        - name: data-volume
          mountPath: /data
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: data-volume
        persistentVolumeClaim:
          claimName: medrag-chroma-pvc
