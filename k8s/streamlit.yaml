---
apiVersion: v1
kind: ConfigMap
metadata:
  name: streamlit-config
  namespace: medrag
data:
  # rag-api Service: port 80 → targetPort 8000.
  # Cluster-içi DNS üzerinden :80 ile çağırıyoruz.
  RAG_API_URL: "http://rag-api.medrag.svc.cluster.local:80"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamlit
  namespace: medrag
spec:
  replicas: 1
  selector:
    matchLabels: { app: streamlit }
  template:
    metadata:
      labels: { app: streamlit }
      annotations:
        prometheus.io/scrape: "false"
    spec:
      containers:
        - name: streamlit
          image: medrag-streamlit:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 8501 }
          envFrom:
            - configMapRef: { name: streamlit-config }
          readinessProbe:
            httpGet: { path: /_stcore/health, port: 8501 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /_stcore/health, port: 8501 }
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: streamlit
  namespace: medrag
spec:
  type: ClusterIP
  selector: { app: streamlit }
  ports:
    - { port: 8501, targetPort: 8501 }
