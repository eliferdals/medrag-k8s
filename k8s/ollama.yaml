---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
  namespace: medrag
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: medrag
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: ollama }
  template:
    metadata:
      labels: { app: ollama }
    spec:
      initContainers:
        - name: pull-model
          image: ollama/ollama:0.3.14
          command: ["/bin/sh","-c"]
          args:
            - |
              ollama serve &
              PID=$!
              sleep 5
              until ollama list >/dev/null 2>&1; do sleep 2; done
              ollama pull llama3.2:3b
              kill $PID
              wait $PID 2>/dev/null || true
          env:
            - { name: OLLAMA_HOST, value: "0.0.0.0:11434" }
            - { name: OLLAMA_MODELS, value: "/root/.ollama/models" }
          volumeMounts:
            - { name: models, mountPath: /root/.ollama }
      containers:
        - name: ollama
          image: ollama/ollama:0.3.14
          ports:
            - { containerPort: 11434 }
          env:
            - { name: OLLAMA_HOST, value: "0.0.0.0:11434" }
            - { name: OLLAMA_MODELS, value: "/root/.ollama/models" }
            - { name: OLLAMA_KEEP_ALIVE, value: "24h" }
          resources:
            requests: { cpu: "500m", memory: "4Gi" }
            limits:   { cpu: "2",    memory: "6Gi" }
          readinessProbe:
            httpGet: { path: /, port: 11434 }
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - { name: models, mountPath: /root/.ollama }
      volumes:
        - name: models
          persistentVolumeClaim: { claimName: ollama-models }
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: medrag
spec:
  selector: { app: ollama }
  ports:
    - { port: 11434, targetPort: 11434 }
