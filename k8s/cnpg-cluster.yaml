apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: medrag-postgres
  namespace: medrag
spec:
  instances: 1
  
  storage:
    size: 1Gi
  
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  
  bootstrap:
    initdb:
      database: app
      owner: app
