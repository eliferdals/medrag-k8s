{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: medrag
  namespace: {{ include "medrag.namespace" . }}
  labels:
    {{- include "medrag.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if .Values.ingress.paths.api.stripPath }}
    # /api/xyz → /xyz olarak rag-api'ye gider
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          {{- if .Values.ragApi.enabled }}
          - path: {{ if .Values.ingress.paths.api.stripPath }}/api(/|$)(.*){{ else }}{{ .Values.ingress.paths.api.path }}{{ end }}
            pathType: {{ if .Values.ingress.paths.api.stripPath }}ImplementationSpecific{{ else }}{{ .Values.ingress.paths.api.pathType }}{{ end }}
            backend:
              service:
                name: rag-api
                port:
                  number: {{ .Values.ragApi.service.port }}
          {{- end }}
          {{- if .Values.streamlit.enabled }}
          - path: {{ .Values.ingress.paths.ui.path }}
            pathType: {{ .Values.ingress.paths.ui.pathType }}
            backend:
              service:
                name: streamlit
                port:
                  number: {{ .Values.streamlit.service.port }}
          {{- end }}
{{- end }}
