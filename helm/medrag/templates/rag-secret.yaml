{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.name }}
  namespace: {{ include "medrag.namespace" . }}
  labels:
    {{- include "medrag.labels" . | nindent 4 }}
  annotations:
    # Secret'ı uninstall'da silme (yanlışlıkla JWT kaybı olmasın)
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  {{- if .Values.secrets.jwtSecret }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  {{- else }}
  # Not verilmediyse placeholder — install sırasında --set ile geç
  JWT_SECRET: "CHANGE_ME_RUN_OPENSSL_RAND"
  {{- end }}
  {{- if .Values.secrets.ncbiApiKey }}
  NCBI_API_KEY: {{ .Values.secrets.ncbiApiKey | quote }}
  {{- end }}
{{- end }}
